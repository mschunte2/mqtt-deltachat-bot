<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shelly Plug</title>
  <link rel="stylesheet" href="style.css">
  <!-- webxdc.js is a virtual URL served by the messenger. Without this
       script tag, window.webxdc is undefined. -->
  <script src="webxdc.js"></script>
</head>
<body>
  <header>
    <select id="device-picker" aria-label="device"></select>
    <span id="online-dot" class="dot"></span>
  </header>

  <section class="state-card">
    <div class="state-line">
      <span class="state-icon">💡</span>
      <span id="state-text">unknown</span>
    </div>
    <div class="metrics">
      <span id="state-power">— W</span>
      <span id="state-energy"></span>
    </div>
  </section>

  <section class="buttons">
    <button id="btn-off" class="off">OFF</button>
    <button id="btn-on" class="on">ON</button>
    <button id="btn-toggle" class="toggle" title="toggle">⇄</button>
  </section>

  <section class="chart">
    <div class="chart-header">
      <span>Power</span>
      <select id="window-pick" aria-label="time window">
        <option value="0">live (5 min)</option>
        <option value="21600">6 hours</option>
        <option value="43200">12 hours</option>
        <option value="86400" selected>24 hours</option>
        <option value="2678400">31 days</option>
      </select>
      <span id="chart-max"></span>
    </div>
    <svg id="sparkline" viewBox="0 0 200 60" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
    <div id="chart-foot" class="chart-foot"></div>
    <div class="bars-header">kWh per bucket</div>
    <svg id="bars" viewBox="0 0 200 36" preserveAspectRatio="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  </section>

  <section class="energy">
    <h3 class="section-title">Energy consumed</h3>
    <div class="energy-grid">
      <div><span class="energy-label">Last hour</span>
           <span id="kwh-last-hour" class="energy-value">—</span></div>
      <div><span class="energy-label">Today</span>
           <span id="kwh-today" class="energy-value">—</span></div>
      <div><span class="energy-label">Last 24h</span>
           <span id="kwh-last-24h" class="energy-value">—</span></div>
      <div><span class="energy-label">This week</span>
           <span id="kwh-this-week" class="energy-value">—</span></div>
      <div><span class="energy-label">Last 7d</span>
           <span id="kwh-last-7d" class="energy-value">—</span></div>
      <div><span class="energy-label">This month</span>
           <span id="kwh-this-month" class="energy-value">—</span></div>
      <div><span class="energy-label">Last 30d</span>
           <span id="kwh-last-30d" class="energy-value">—</span></div>
      <div><span class="energy-label">Lifetime</span>
           <span id="kwh-total" class="energy-value">—</span></div>
    </div>
  </section>

  <details class="recent-events">
    <summary>Recent events</summary>
    <div id="events-list" class="events-list">(loading…)</div>
  </details>

  <details class="tuning">
    <summary>Tuning · power threshold</summary>
    <form id="tune-form">
      <label>Alert when power ≥
        <input type="number" id="tune-watts" value="1500" min="0" step="10"> W</label>
      <label>for at least
        <input type="number" id="tune-secs"  value="30" min="1"> s</label>
      <button type="button" id="tune-apply">Apply (in-memory)</button>
      <small>Persistence requires editing devices.json on the bot host.</small>
    </form>
  </details>

  <details class="auto-off">
    <summary>
      <span>Auto-off</span>
      <span id="auto-status" class="auto-status">(none)</span>
    </summary>
    <form id="auto-form">
      <label class="opt"><input type="radio" name="auto" value="none" checked> none</label>
      <label class="opt"><input type="radio" name="auto" value="timer"> in
        <input type="number" id="auto-min" value="30" min="1" max="1440"> min</label>
      <label class="opt"><input type="radio" name="auto" value="tod"> at
        <input type="time" id="auto-tod" value="22:00">
        <label class="sub"><input type="checkbox" id="auto-tod-daily"> daily</label>
      </label>
      <label class="opt"><input type="radio" name="auto" value="idle"> below
        <input type="number" id="auto-idle-w" value="5" min="0" step="0.1"> W for
        <input type="number" id="auto-idle-s" value="60" min="5"> s</label>
      <label class="opt"><input type="radio" name="auto" value="consumed"> used &lt;
        <input type="number" id="auto-cons-wh" value="5" min="0" step="0.1"> Wh in
        <input type="number" id="auto-cons-min" value="10" min="1"> min</label>
      <div class="actions">
        <button type="button" id="btn-apply">Apply</button>
        <button type="button" id="btn-cancel" hidden>Cancel pending</button>
      </div>
    </form>
  </details>

  <footer>
    <small id="last-update">no data yet</small>
  </footer>

  <script src="main.js"></script>
</body>
</html>
